# =============================================================================
# Octo Server Configuration
# =============================================================================
# Copy this file to config.yaml and uncomment/modify parameters as needed.
# Priority: config.yaml < CLI args < .env
# =============================================================================

# Server configuration
# server:
#   host: 127.0.0.1    # Server bind address
#   port: 3001          # Server port

# LLM Provider configuration
# provider:
#   name: anthropic     # Provider: anthropic or openai
#   api_key: ""         # API key (required)
#   base_url: None      # Optional proxy URL
#   model: None         # Optional model override

# Database configuration
# When path is empty, OctoRoot resolves it automatically:
#   1. OCTO_DB_PATH env var
#   2. ./data/octo.db (if exists, legacy server)
#   3. ./octo.db (if exists, legacy CLI)
#   4. ~/.octo/projects/<project_key>/octo.db (new default)
# database:
#   path: ""  # Empty = auto-resolve via OctoRoot

# Logging configuration
# logging:
#   level: octo_server=debug,octo_engine=debug,tower_http=debug

# MCP configuration
# mcp:
#   servers_dir: None   # Optional MCP servers directory

# Skills configuration
# Skills configuration
# When OctoRoot is active, skills are auto-loaded from:
#   1. $PWD/.octo/skills/ (project-level)
#   2. ~/.octo/skills/ (global)
# skills:
#   dirs: []  # Auto-resolved by OctoRoot when empty

# Working directory for sandbox (optional)
# working_dir: "./data/sandbox"   # Optional working directory

# Enable event bus for observability
# enable_event_bus: false    # Enable event bus (default: false)

# TLS configuration
# tls:
#   enabled: false        # Enable HTTPS
#   cert_path: null       # Path to PEM certificate
#   key_path: null        # Path to PEM private key
#   self_signed: false    # Auto-generate self-signed cert
#   self_signed_dir: null # Output dir for self-signed certs

# Auth configuration
# Configure via environment variables (recommended) or inline below.
#
# Option 1: Disable auth (local dev only)
#   OCTO_AUTH_MODE=none
#
# Option 2: API key auth
#   OCTO_AUTH_MODE=api_key
#   OCTO_API_KEY=your-secret-key     # key clients use in Authorization: Bearer header
#   OCTO_API_KEY_USER=dev            # optional user id (default: "default")
#
# auth:
#   mode: api_key   # none | api_key
#   api_keys:
#     - key: "your-secret-key"
#       user_id: "dev"
#       permissions: ["read", "write", "admin"]

# Scheduler configuration
# scheduler:
#   enabled: false          # Enable cron scheduler
#   check_interval_secs: 60  # Interval between task checks (seconds)
#   max_concurrent: 5       # Max concurrent scheduled tasks

# Provider chain configuration (optional, multi-provider failover)
# provider_chain:
#   failover_policy: automatic  # automatic | manual
#   health_check_interval_sec: 30
#   instances:
#     - name: primary
#       provider: anthropic
#       model: claude-sonnet-4-20250514
#       priority: 1
#     - name: fallback
#       provider: openai
#       model: gpt-4o
#       priority: 2

# Smart routing configuration (optional, complexity-based model routing)
# smart_routing:
#   enabled: false         # Enable smart routing
#   default_tier: medium    # Default tier: low | medium | high
#   tiers: {}               # Custom tier configurations
#   thresholds: null        # Custom analyzer thresholds

# Sync configuration (offline-first sync with HLC timestamps)
# sync:
#   enabled: false          # Enable offline sync
#   node_id: null          # Node identifier (auto-generated UUID if not set)

