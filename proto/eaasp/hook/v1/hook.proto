syntax = "proto3";

package eaasp.hook.v1;

import "eaasp/common/v1/common.proto";

// HookBridge Service — L1 Runtime ↔ HookBridge bidirectional communication.
//
// T1 Harness (Grid) does not need HookBridge — hooks execute natively in-process.
// T2 Aligned / T3 Framework runtimes communicate with HookBridge sidecar via this protocol.
//
// Bidirectional streaming mode:
//   L1 → HookBridge: send hook events (tool_call, tool_result, stop)
//   HookBridge → L1: return hook decisions + optional policy update push
//
// Spec reference: EAASP §6.3, §10.4
service HookBridgeService {
  // Bidirectional stream: L1 runtime sends hook events, HookBridge returns decisions.
  // HookBridge may also push policy updates on the same connection.
  rpc StreamHooks(stream HookEvent) returns (stream HookResponse);

  // One-shot hook evaluation (simple mode, no persistent stream needed).
  rpc EvaluateHook(HookEvaluateRequest) returns (eaasp.common.v1.HookDecision);

  // Report hook execution telemetry to HookBridge.
  rpc ReportTelemetry(eaasp.common.v1.TelemetryBatch) returns (TelemetryAck);

  // Get summary of currently loaded policies.
  rpc GetPolicySummary(PolicySummaryRequest) returns (PolicySummary);
}

// ── Bidirectional Stream Message Types ──

// L1 → HookBridge direction
message HookEvent {
  string session_id = 1;
  string request_id = 2; // correlate request-response pairs

  oneof event {
    PreToolCallHook pre_tool_call = 10;
    PostToolResultHook post_tool_result = 11;
    StopHook stop = 12;
    SessionStartHook session_start = 13;
    SessionEndHook session_end = 14;
  }
}

message PreToolCallHook {
  string tool_name = 1;
  string tool_id = 2;
  string input_json = 3;
}

message PostToolResultHook {
  string tool_name = 1;
  string tool_id = 2;
  string output = 3;
  bool is_error = 4;
}

message StopHook {
  string reason = 1;
}

message SessionStartHook {
  string user_id = 1;
  string user_role = 2;
  string org_unit = 3;
}

message SessionEndHook {
  string reason = 1;
}

// HookBridge → L1 direction
message HookResponse {
  string request_id = 1; // matches the corresponding HookEvent

  oneof response {
    eaasp.common.v1.HookDecision decision = 10;       // hook evaluation result
    eaasp.common.v1.StopDecision stop_decision = 11;   // stop hook evaluation result
    PolicyUpdate policy_update = 12;                    // L3 policy update push
    ErrorResponse error = 13;                           // error
  }
}

message PolicyUpdate {
  string policy_id = 1;
  string policy_json = 2;  // updated policy JSON
  string action = 3;       // "add" | "update" | "remove"
  string timestamp = 4;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
}

// ── One-Shot Evaluation Mode ──

message HookEvaluateRequest {
  string session_id = 1;
  string hook_type = 2; // "pre_tool_call" | "post_tool_result" | "stop"

  // Populated based on hook_type
  string tool_name = 3;
  string tool_id = 4;
  string input_json = 5;  // for pre_tool_call
  string output = 6;      // for post_tool_result
  bool is_error = 7;      // for post_tool_result
}

// ── Telemetry ──

message TelemetryAck {
  uint32 accepted = 1;
  uint32 rejected = 2;
}

// ── Policy ──

message PolicySummaryRequest {
  string session_id = 1;
}

message PolicySummary {
  uint32 total_policies = 1;
  repeated PolicyInfo policies = 2;
}

message PolicyInfo {
  string policy_id = 1;
  string name = 2;
  string scope = 3;      // "global" | "session" | "skill"
  string hook_type = 4;  // "pre_tool_call" | "post_tool_result" | "stop"
  bool enabled = 5;
}
