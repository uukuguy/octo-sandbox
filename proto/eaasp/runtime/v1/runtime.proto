syntax = "proto3";

package eaasp.runtime.v1;

// EAASP L1 Runtime Contract — 13-method interface.
//
// Any agent runtime that implements this service can join the EAASP runtime pool.
// Grid implements this natively via Rust trait (zero serialization).
// External adapters (Python/TS) implement this via gRPC.

service RuntimeService {
  // Initialize a session with platform payload (user context, hooks, quotas).
  rpc Initialize(InitializeRequest) returns (InitializeResponse);

  // Send a user message and receive streaming response chunks.
  rpc Send(SendRequest) returns (stream ResponseChunk);

  // Load a workflow-skill (SKILL.md content + frontmatter hooks).
  rpc LoadSkill(LoadSkillRequest) returns (LoadSkillResponse);

  // Pre-tool-call hook interception point.
  rpc OnToolCall(ToolCallEvent) returns (HookDecision);

  // Post-tool-result hook interception point.
  rpc OnToolResult(ToolResultEvent) returns (HookDecision);

  // Agent stop event (exit-2 can force continue).
  rpc OnStop(StopRequest) returns (StopDecision);

  // Serialize full session state for persistence.
  rpc GetState(GetStateRequest) returns (SessionState);

  // Restore session from serialized state.
  rpc RestoreState(SessionState) returns (InitializeResponse);

  // Connect to MCP servers.
  rpc ConnectMcp(ConnectMcpRequest) returns (ConnectMcpResponse);

  // Emit standardized telemetry events.
  rpc EmitTelemetry(EmitTelemetryRequest) returns (TelemetryBatch);

  // Return capability manifest.
  rpc GetCapabilities(Empty) returns (CapabilityManifest);

  // Clean up resources, flush telemetry, emit SessionEnd.
  rpc Terminate(TerminateRequest) returns (TerminateResponse);

  // Health check.
  rpc Health(Empty) returns (HealthStatus);
}

// ── Request / Response types ──

message Empty {}

message InitializeRequest {
  SessionPayload payload = 1;
}

message InitializeResponse {
  string session_id = 1;
}

message SessionPayload {
  string user_id = 1;
  string user_role = 2;
  string org_unit = 3;
  string managed_hooks_json = 4;  // managed-settings.json content
  map<string, string> quotas = 5;
  map<string, string> context = 6; // additional key-value context
}

message SendRequest {
  string session_id = 1;
  UserMessage message = 2;
}

message UserMessage {
  string content = 1;
  string message_type = 2; // "text" | "intent"
  map<string, string> metadata = 3;
}

message ResponseChunk {
  string chunk_type = 1; // "text_delta" | "tool_start" | "tool_result" | "thinking" | "done" | "error"
  string content = 2;
  string tool_name = 3;   // for tool_start/tool_result
  string tool_id = 4;     // for tool_start/tool_result
  bool is_error = 5;
}

message LoadSkillRequest {
  string session_id = 1;
  SkillContent skill = 2;
}

message SkillContent {
  string skill_id = 1;
  string name = 2;
  string frontmatter_yaml = 3;  // YAML frontmatter (scoped hooks, affinity, metadata)
  string prose = 4;             // natural language instructions
}

message LoadSkillResponse {
  bool success = 1;
  string error = 2;
}

message ToolCallEvent {
  string session_id = 1;
  string tool_name = 2;
  string tool_id = 3;
  string input_json = 4;
}

message ToolResultEvent {
  string session_id = 1;
  string tool_name = 2;
  string tool_id = 3;
  string output = 4;
  bool is_error = 5;
}

message HookDecision {
  string decision = 1; // "allow" | "deny" | "modify"
  string reason = 2;
  string modified_input = 3; // only for "modify"
}

message StopRequest {
  string session_id = 1;
}

message StopDecision {
  string decision = 1; // "complete" | "continue"
  string feedback = 2; // reason to continue (for exit-2)
}

message GetStateRequest {
  string session_id = 1;
}

message SessionState {
  string session_id = 1;
  bytes state_data = 2;         // opaque serialized state
  string runtime_id = 3;
  string created_at = 4;        // ISO 8601
}

message ConnectMcpRequest {
  string session_id = 1;
  repeated McpServerConfig servers = 2;
}

message McpServerConfig {
  string name = 1;
  string transport = 2; // "stdio" | "sse" | "streamable-http"
  string command = 3;   // for stdio
  repeated string args = 4;
  string url = 5;       // for sse/http
  map<string, string> env = 6;
}

message ConnectMcpResponse {
  bool success = 1;
  repeated string connected = 2;
  repeated string failed = 3;
}

message EmitTelemetryRequest {
  string session_id = 1;
}

message TelemetryBatch {
  repeated TelemetryEvent events = 1;
}

message TelemetryEvent {
  string session_id = 1;
  string runtime_id = 2;
  string user_id = 3;
  string event_type = 4;  // "tool_call" | "tool_result" | "hook_decision" | "session_end"
  string timestamp = 5;   // ISO 8601
  string payload_json = 6;
  ResourceUsage resource_usage = 7;
}

message ResourceUsage {
  uint64 input_tokens = 1;
  uint64 output_tokens = 2;
  uint64 compute_ms = 3;
}

message CapabilityManifest {
  string runtime_id = 1;
  string runtime_name = 2;
  string tier = 3;                    // "harness" | "aligned" | "framework"
  string model = 4;                   // e.g. "claude-sonnet-4-20250514"
  uint32 context_window = 5;
  repeated string supported_tools = 6;
  bool native_hooks = 7;
  bool native_mcp = 8;
  bool native_skills = 9;
  CostEstimate cost = 10;
  map<string, string> metadata = 11;
}

message CostEstimate {
  double input_cost_per_1k = 1;
  double output_cost_per_1k = 2;
}

message TerminateRequest {
  string session_id = 1;
}

message TerminateResponse {
  bool success = 1;
  TelemetryBatch final_telemetry = 2;
}

message HealthStatus {
  bool healthy = 1;
  string runtime_id = 2;
  map<string, string> checks = 3; // e.g. "provider" -> "ok", "mcp" -> "degraded"
}
