name: Evaluation CI

on:
  pull_request:
    paths:
      - 'crates/grid-eval/**'
      - 'crates/grid-engine/**'
      - 'crates/grid-types/**'
      - 'crates/grid-sandbox/**'
  push:
    branches: [main]
    paths:
      - 'crates/grid-eval/**'
      - 'crates/grid-engine/**'
      - 'crates/grid-sandbox/**'
  schedule:
    - cron: '0 2 * * *'  # nightly 02:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  eval-tests:
    name: Evaluation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-eval-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-eval-

      - name: Unit & integration tests
        run: cargo test -p grid-eval -- --test-threads=1

      - name: Run provider suite (mock, no LLM)
        run: cargo run -p grid-eval -- run --suite provider --output eval_output/provider

      - name: Run memory suite (mock, no LLM)
        run: cargo run -p grid-eval -- run --suite memory --output eval_output/memory

      - name: Run resilience suite (mock, no LLM)
        run: cargo run -p grid-eval -- run --suite resilience --output eval_output/resilience

      - name: Run GAIA benchmark (mock mode)
        run: cargo run -p grid-eval -- run --suite gaia --output eval_output/gaia

      - name: Run SWE-bench benchmark (requires Docker)
        if: env.DOCKER_AVAILABLE == 'true'
        run: cargo run -p grid-eval -- run --suite swe_bench --output eval_output/swe_bench

      - name: Run τ-bench benchmark (mock mode)
        run: cargo run -p grid-eval -- run --suite tau_bench --output eval_output/tau_bench

      - name: Run replay baseline (if traces exist)
        if: hashFiles('crates/grid-eval/datasets/replay_baseline/traces/*.json') != ''
        run: cargo run -p grid-eval -- run --suite tool_call --replay crates/grid-eval/datasets/replay_baseline/ --output eval_output/replay

      - name: Run benchmark regression (if baseline exists)
        if: hashFiles('eval_output/benchmark/*/comparison.json') != ''
        run: |
          cargo run -p grid-eval -- benchmark \
            --input eval_output/benchmark \
            --output eval_output/benchmark/final

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-output
          path: eval_output/
          retention-days: 14

      - name: Comment regression on PR
        if: github.event_name == 'pull_request' && hashFiles('eval_output/replay/regression.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "$(cat eval_output/replay/regression.md)"

  docker-sandbox-tests:
    name: Docker Sandbox Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sandbox-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sandbox-

      - name: Run Docker sandbox tests
        run: cargo test -p grid-engine sandbox_docker -- --test-threads=1

      - name: Run sandbox policy tests
        run: cargo test -p grid-engine --lib "sandbox::router::tests" -- --test-threads=1

      - name: Run sandbox audit tests
        run: cargo test -p grid-engine --lib "sandbox::audit" -- --test-threads=1

      - name: Run WASM sandbox tests
        run: cargo test -p grid-engine --test sandbox_wasm_test -- --test-threads=1

      - name: Verify no container leak
        run: |
          count=$(docker ps -a --filter label=grid-sandbox -q | wc -l)
          if [ "$count" -gt "0" ]; then
            echo "LEAK: $count orphaned sandbox containers"
            docker ps -a --filter label=grid-sandbox
            exit 1
          fi
          echo "No orphaned sandbox containers detected"
