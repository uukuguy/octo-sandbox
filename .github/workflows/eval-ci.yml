name: Evaluation CI

on:
  pull_request:
    paths:
      - 'crates/octo-eval/**'
      - 'crates/octo-engine/**'
      - 'crates/octo-types/**'
  push:
    branches: [main]
    paths:
      - 'crates/octo-eval/**'
      - 'crates/octo-engine/**'
  schedule:
    - cron: '0 2 * * *'  # nightly 02:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  eval-tests:
    name: Evaluation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-eval-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-eval-

      - name: Unit & integration tests
        run: cargo test -p octo-eval -- --test-threads=1

      - name: Run provider suite (mock, no LLM)
        run: cargo run -p octo-eval -- run --suite provider --output eval_output/provider

      - name: Run memory suite (mock, no LLM)
        run: cargo run -p octo-eval -- run --suite memory --output eval_output/memory

      - name: Run resilience suite (mock, no LLM)
        run: cargo run -p octo-eval -- run --suite resilience --output eval_output/resilience

      - name: Run GAIA benchmark (mock mode)
        run: cargo run -p octo-eval -- run --suite gaia --output eval_output/gaia

      - name: Run SWE-bench benchmark (requires Docker)
        if: env.DOCKER_AVAILABLE == 'true'
        run: cargo run -p octo-eval -- run --suite swe_bench --output eval_output/swe_bench

      - name: Run τ-bench benchmark (mock mode)
        run: cargo run -p octo-eval -- run --suite tau_bench --output eval_output/tau_bench

      - name: Run replay baseline (if traces exist)
        if: hashFiles('crates/octo-eval/datasets/replay_baseline/traces/*.json') != ''
        run: cargo run -p octo-eval -- run --suite tool_call --replay crates/octo-eval/datasets/replay_baseline/ --output eval_output/replay

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-output
          path: eval_output/
          retention-days: 14

      - name: Comment regression on PR
        if: github.event_name == 'pull_request' && hashFiles('eval_output/replay/regression.md') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --body "$(cat eval_output/replay/regression.md)"
