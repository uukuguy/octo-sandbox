# Unified benchmark configuration for GAIA and SWE-bench evaluations
# Used by: cargo run -p octo-eval -- benchmark --config config/eval/benchmark.toml

[default]
timeout_secs = 300
record_traces = true
max_iterations = 30

# === Standard Model Set (5 models, all via OpenRouter) ===

[[models]]
name = "Qwen3.5-27B"
provider = "openai"
model = "qwen/qwen3.5-27b"
tier = "standard"

[[models]]
name = "MiniMax-M2.1"
provider = "openai"
model = "minimax/minimax-m2.1"
tier = "standard"

[[models]]
name = "Qwen3.5-9B"
provider = "openai"
model = "qwen/qwen3.5-9b"
tier = "economy"

[[models]]
name = "Qwen3-Coder-Next"
provider = "openai"
model = "qwen/qwen3-coder-next"
tier = "high"

[[models]]
name = "GLM-4.7-Flash"
provider = "openai"
model = "z-ai/glm-4.7-flash"
tier = "economy"

[[models]]
name = "Claude-Sonnet-4.6"
provider = "openai"
model = "anthropic/claude-sonnet-4-6"
tier = "flagship"

# === GAIA ===
[gaia]
dataset = "crates/octo-eval/datasets/gaia_sample.jsonl"
scorer = "exact_match"

[gaia.sampling]
quick = 10
standard = 30
full = 165
default = "standard"
stratified_ratio = [0.3, 0.5, 0.2]  # L1:L2:L3

# === SWE-bench ===
[swe_bench]
dataset = "crates/octo-eval/datasets/swe_bench_lite.jsonl"
scorer = "swebench_harness"
docker_required = true

[swe_bench.sampling]
quick = 10
standard = 30
full = 300
default = "standard"

[swe_bench.harness]
dataset_name = "princeton-nlp/SWE-bench_Lite"
max_workers = 4
cache_level = "env"
namespace = ""
