# GAIA R3 — Filtered dataset evaluation (capability-based filtering)
#
# Uses gaia_filtered benchmark: excludes image/audio/video tasks (165 → 149)
# Search: Tavily (same as R2 for fair comparison)
# Sampling: standard 30 tasks (stratified L1:L2:L3 = 30%:50%:20%)

[default]
timeout_secs = 300
record_traces = true
max_iterations = 30

# 4 models — same as R1/R2 for consistency
[[models]]
name = "Qwen3.5-9B"
provider = "openai"
model = "qwen/qwen3.5-9b"
tier = "economy"

[[models]]
name = "Qwen3.5-27B"
provider = "openai"
model = "qwen/qwen3.5-27b"
tier = "standard"

[[models]]
name = "Qwen3-Coder-Next"
provider = "openai"
model = "qwen/qwen3-coder-next"
tier = "high"

[[models]]
name = "MiniMax-M2.1"
provider = "openai"
model = "minimax/minimax-m2.1"
tier = "standard"

[gaia_filtered]
dataset = "crates/octo-eval/datasets/gaia_sample.jsonl"
scorer = "exact_match"
exclude_file_extensions = ["png", "jpg", "jpeg", "gif", "mp3", "pptx"]
exclude_question_patterns = ["youtube.com"]

[gaia_filtered.sampling]
quick = 10
standard = 30
full = 149
default = "standard"
stratified_ratio = [0.3, 0.5, 0.2]
