version: '3.8'

services:
  octo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
      - "5180:5180"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OCTO_HOST=0.0.0.0
      - OCTO_PORT=3001
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - octo-network

networks:
  octo-network:
    driver: bridge
